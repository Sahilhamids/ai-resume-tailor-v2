[theme]
primaryColor = "#6366f1" # A modern Indigo/Purple (like Stripe or Vercel)
backgroundColor = "#0f172a" # Deep sleek slate dark mode
secondaryBackgroundColor = "#1e293b" # Slightly lighter slate for sidebars/cards
textColor = "#f8fafc" # Crisp white text
font = "sans serif"

[client]
showSidebarNavigation = false # Hides the default bulky sidebar navigation